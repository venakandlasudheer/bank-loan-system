<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Loan System - Register</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">🏦</div>
            <h2>Create Account</h2>
            <p class="subtitle">Register to apply for loans</p>

            <div id="errorMsg" class="error-msg" style="display:none"></div>
            <div id="successMsg" class="success-msg" style="display:none"></div>

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter username" />
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter email" />
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password" />
            </div>

            <button class="btn" onclick="register()">Register</button>

            <p class="link">Already have an account? <a href="index.html">Login here</a></p>
        </div>
    </div>

    <script>
        async function register() {
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!username || !email || !password) {
                showError('Please fill all fields');
                return;
            }

            try {
                const response = await fetch('https://bank-loan-system-production.up.railway.app/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username,
                        email,
                        password,
                        role: 'ROLE_USER'
                    })
                });

                const data = await response.text();

                if (response.ok) {
                    showSuccess('Registration successful! Redirecting to login...');
                    setTimeout(() => window.location.href = 'index.html', 2000);
                } else {
                    showError(data);
                }
            } catch (error) {
                showError('Cannot connect to server. Make sure services are running!');
            }
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('successMsg').style.display = 'none';
        }

        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
        }
    </script>
</body>
</html>
